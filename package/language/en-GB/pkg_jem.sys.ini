PKG_JEM="JEM - Package"
PKG_JEM_INSTALLATION_DESCRIPTION="<p>JEM is an Event Management Component for Joomla.</p><p>It is not a classical calendar - it is an easy way to manage and present events for your group, company or community.<br>JEM offers many features and possibilities, including venue management, event recurrence, registration, map service links, frontend event and venue submission, and more.</p><p>This package installs the JEM component (<code>com_jem</code>) together with these modules and plugins:</p><div class='row'><div class='col-md-6'><h3>Modules</h3><ul><li>Latest Events Basic module (<code>mod_jem</code>)</li><li>Latest Events Wide module (<code>mod_jem_wide</code>)</li><li>Calendar module (<code>mod_jem_cal</code>)</li><li>Venues Map module (<code>mod_jem_map</code>)</li><li>Teaser module (<code>mod_jem_teaser</code>)</li><li>Banner module (<code>mod_jem_banner</code>)</li><li>Jubilee module (<code>mod_jem_jubilee</code>)</li><li>Types module (<code>mod_jem_types</code>)</li></ul></div><div class='col-md-6'><h3>Plugins</h3><ul><li>Content List Events plugin (<code>plg_content_jemlistevents</code>)</li><li>Embed plugin (<code>plg_content_jemembed</code>)</li><li>Finder plugin (<code>plg_finder_jem</code>)</li><li>Comments plugin (<code>plg_jem_comments</code>)</li><li>Mailer plugin (<code>plg_jem_mailer</code>)</li><li>Quick Icon plugin (<code>plg_quickicon_jem</code>)</li></ul></div></div><p>If you want to use any of these modules and plugins, please publish them in the module manager and plugin manager in your site backend.</p><p>Community support is provided at <a href='https://www.joomlaeventmanager.net/forum' target='_blank'>www.joomlaeventmanager.net/forum</a></p><p><a href='https://www.joomlaeventmanager.net/project/changelog' target='_blank'>Changelog</a></p><p>JEM is based on Eventlist by Christoph Lukes.</p>"
